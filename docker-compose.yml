services:
  telegram-proxy:
    build: .
    container_name: telegram-proxy
    restart: always
    # НЕ НУЖНО мапить порты! Traefik будет сам маршрутизировать
    # ports:
    #   - "3001:3000"
    environment:
      - PORT=3000
      - PROXY_HOST=${PROXY_HOST}
      - PROXY_PORT=${PROXY_PORT}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASS=${PROXY_PASS}
      - NODE_ENV=production
    networks:
      - dokploy-network
    # ============================================
    # ВАЖНО: Добавьте эти labels для Traefik
    # ============================================
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.telegram-proxy.rule=Host(`tgproxy.w1do.ru`)"
      - "traefik.http.routers.telegram-proxy.entrypoints=websecure"
      - "traefik.http.routers.telegram-proxy.tls.certresolver=letsencrypt"
      - "traefik.http.services.telegram-proxy.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true